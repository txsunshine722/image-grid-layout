<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonderland Image Grid Layout</title>
    <link rel="stylesheet" href="styles/styles.css">

</head>
<body>
    <div class="container">
        <div class="image">
            <div class="one">
                <img 
                src="images/5alice.jpg" 
                alt="Alice sitting in between the Queens illustrated in black and white">

            </div>
            
            <div class="two">
                <img 
                src="images/6alice.jpg" 
                alt="Tenniel illustration: spade gardeners painting roses red">

            </div>

            <div class="three">
                <img
                src="images/7alice.jpg"
                alt="Alice and the Caterpillar on illustrated Alice in Wonderland book cover">
            </div>

            <div class="four">
                <img
                src="images/8alice.jpg"
                alt="Vintage Alice in Wonderland book cover with playing card royalty">
                
            </div>

            <div class="five">
                <img
                src="images/9alice.jpg"
                alt="Mad Tea Party scene with Hatter, Hare, and Dormouse">
            </div>

            <div class="six">
                <img
                src="images/10alice.jpg"
                alt="Tweedledum and Tweedledee on Through the Looking-Glass book cover">
            </div>
        </div>
    </div>
    
</body>
</html>
